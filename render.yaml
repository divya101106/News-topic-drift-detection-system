services:
  # Backend API Service
  - type: web
    name: drift-sense-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEWS_API_KEY
        value: pub_d8ede7bbda494f5fa882230aa626cbc4
      - key: DATABASE_URL
        value: sqlite:///./drift.db
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Static Site
  - type: web
    name: drift-sense-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://drift-sense-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
